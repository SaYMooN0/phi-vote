authDb {
  poolName = "quill"
  maximumPoolSize = 3
  connectionTimeout = 20000
  transactionIsolation = TRANSACTION_SERIALIZABLE
  dataSourceClassName = org.postgresql.ds.PGSimpleDataSource
  dataSource {
    url = ${BASE_JDBC_URL}"/"${AUTH_SERVICE_DB_NAME}
    user = ${DB_USER}
    password = ${DB_PASSWORD}
  }
}
passwordHashing {
  iterations = ${PH_ITERATIONS}
  memoryKiB = ${PH_MEMORY_IN_KB}
  parallelism = ${PH_PARALLELISM}
  saltLength = ${PH_SALT}
  hashLength = ${PH_HASH}
}
