authServiceDb {
  poolName = "quill"
  maximumPoolSize = 3
  connectionTimeout = 20000
  transactionIsolation = TRANSACTION_SERIALIZABLE
  dataSourceClassName = org.postgresql.ds.PGSimpleDataSource
  dataSource {
    url = ${BASE_JDBC_URL}"/"${AUTH_SERVICE_DB_NAME}
    user = ${DB_USER}
    password = ${DB_PASSWORD}
  }
  migrations {
    enabled = true
    locations = ["classpath:db/migration/auth"]
  }
}
passwordHashing {
  iterations = ${PH_ITERATIONS}
  memoryKiB = ${PH_MEMORY_IN_KB}
  parallelism = ${PH_PARALLELISM}
  saltLength = ${PH_SALT}
  hashLength = ${PH_HASH}
}
frontend {
  baseUrl = ${FRONTEND_BASE_URL}
  confirmRegistrationPath = ${FRONTEND_CONFIRM_REGISTRATION_PATH}
}
emailService {
  sender = ${EMAIL_SENDER}
  host = ${EMAIL_HOST}
  port = ${EMAIL_PORT}
  user = ${EMAIL_USER}
  pass = ${EMAIL_PASSWORD}
}

accessTokenIssuing {
  issuer = ${JWT_ISSUER}
  audience = ${JWT_AUDIENCE}
  keyId = ${JWT_KEY_ID}

  publicKeyPem = ${JWT_PUBLIC_KEY_PEM}
  privateKeyPem = ${JWT_PRIVATE_KEY_PEM}

  ttlSeconds = ${JWT_ACCESS_TTL_SECONDS}
}

refreshToken {
  ttlSeconds = ${REFRESH_TOKEN_TTL_SECONDS}
  hmacSecret = ${REFRESH_TOKEN_HMAC_SECRET}
}

authCookie {
  accessTokenCookieName = "access_token"
  refreshTokenCookieName = "refresh_token"
  unauthenticatedCtxCookieName = "unauth_ctx_id"
  

  secure = ${AUTH_COOKIE_SECURE}
  sameSite = "Lax"

  accessTokenPath = "/api"
  refreshTokenPath = "/api/auth"
}